<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QGAI vSL to TP Equalizer Mockup</title>
  <style>
    :root{
      --bg:#05070a;
      --panel:#0b1118;
      --panel2:#090d13;
      --border:#162436;
      --dim:#7b8794;
      --red:#ef4444;
      --orange:#f97316;
      --gold:#fbbf24;
      --green:#22c55e;
      --cyan:#4cc9f0;
      --blue:#0b84e5;
      --orb:"Segoe UI",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:radial-gradient(circle at 50% 20%,#0e1724 0,#05070a 45%,#020305 100%);
      color:#e5edf6;
      font-family:var(--orb);
    }
    .mock{
      width:min(980px,94vw);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px;
      box-shadow:0 20px 80px rgba(0,0,0,.45);
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      font-size:13px;
      color:var(--dim);
    }
    .title{color:#fff;font-weight:700;letter-spacing:.5px}
    .r-badge{
      color:var(--green);
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.25);
      border-radius:999px;
      padding:3px 12px;
      font-weight:700;
    }
    .labels{
      display:flex;
      justify-content:space-between;
      margin-bottom:6px;
      font-size:13px;
      font-weight:700;
    }
    .track{
      position:relative;
      height:120px;
      background:radial-gradient(circle at 62% 50%,rgba(249,115,22,.24),transparent 25%),#020305;
      border:1px solid #07131f;
      border-radius:6px;
      overflow:visible;
      padding:10px 12px;
    }
    .eq-grid{
      position:absolute;
      inset:10px 14px;
      display:grid;
      grid-template-columns:repeat(24,1fr);
      gap:4px;
      z-index:1;
    }
    .eq-col{
      position:relative;
      min-width:0;
      border-radius:1px;
      background:var(--c);
      opacity:.88;
      box-shadow:0 0 8px color-mix(in srgb,var(--c),transparent 62%),inset 0 0 0 1px rgba(255,255,255,.12);
      filter:saturate(1.22);
      transition:transform .25s,box-shadow .25s,filter .25s;
    }
    .eq-col.on{
      opacity:1;
      box-shadow:0 0 14px color-mix(in srgb,var(--c),transparent 28%),0 0 26px color-mix(in srgb,var(--c),transparent 62%),inset 0 0 0 1px rgba(255,255,255,.24);
      filter:saturate(1.55) brightness(1.18);
    }
    .eq-col.current{transform:scaleY(1.3);z-index:4;box-shadow:0 0 12px #fff,0 0 24px color-mix(in srgb,var(--c),transparent 20%),0 0 44px color-mix(in srgb,var(--c),transparent 45%),inset 0 0 0 2px rgba(255,255,255,.88);filter:saturate(1.8) brightness(1.28);animation:currentPulse 1.1s infinite}
    .eq-col.current:after{content:attr(data-price);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.78);background:#fff8dc;color:#241000;border:1px solid #fbbf24;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:900;white-space:nowrap;box-shadow:0 0 14px rgba(251,191,36,.9);z-index:5}
    @keyframes currentPulse{0%,100%{filter:saturate(1.75) brightness(1.22)}50%{filter:saturate(2) brightness(1.42)}}
    .marker{
      position:absolute;
      top:0;
      bottom:0;
      width:1px;
      background:rgba(255,255,255,.42);
      z-index:2;
    }
    .bottom{
      display:flex;
      justify-content:space-between;
      color:var(--dim);
      font-size:12px;
      margin-top:6px;
    }
    .trade{
      margin-top:10px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
    }
    .cell{
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:6px;
      padding:8px;
      min-width:0;
    }
    .key{font-size:11px;color:var(--dim);text-transform:uppercase;margin-bottom:3px}
    .val{font-weight:800;font-size:17px}
    @media (max-width:700px){
      .track{height:88px}
      .eq-grid{gap:3px}
      .eq-block{height:6px}
      .trade{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <main class="mock">
    <div class="top">
      <span class="title">OPEN TRADE #1517645812 · BUY XAUUSD</span>
      <span class="r-badge">R: +0.82</span>
    </div>
    <div class="labels">
      <span style="color:var(--red)">vSL 4012.20</span>
      <span style="color:var(--green)">TP 4054.80</span>
    </div>
    <div class="track">
      <div class="eq-grid" id="eq"></div>
      <div class="marker" style="left:30%"></div>
      <div class="marker" style="left:50%"></div>
      <div class="marker" style="left:70%"></div>
    </div>
    <div class="bottom">
      <span style="color:var(--red)">vSL</span>
      <span>Entry</span>
      <span style="color:var(--gold)">0.5R</span>
      <span style="color:var(--green)">1R</span>
      <span style="color:var(--green)">TP</span>
    </div>
    <section class="trade">
      <div class="cell"><div class="key">Entry</div><div class="val">4022.90</div></div>
      <div class="cell"><div class="key">Current</div><div class="val" id="cur_price" style="color:var(--gold)">4037.20</div></div>
      <div class="cell"><div class="key">vSL Dist</div><div class="val" id="vsl_dist" style="color:var(--green)">$25.00</div></div>
      <div class="cell"><div class="key">TP Dist</div><div class="val" id="tp_dist" style="color:var(--green)">$17.60</div></div>
      <div class="cell"><div class="key">Floating</div><div class="val" id="float_pnl" style="color:var(--green)">+$6,782</div></div>
    </section>
  </main>
  <script>
    const colors = [
      '#ef4444','#f43f5e','#ec4899','#d946ef','#a855f7','#8b5cf6',
      '#facc15','#eab308','#fbbf24','#f59e0b','#f97316','#fb923c',
      '#06b6d4','#22d3ee','#0ea5e9','#38bdf8','#3b82f6','#6366f1',
      '#d9f99d','#c6f51e','#a3e635','#84cc16','#22c55e','#16a34a'
    ];
    let activeCols = 15;
    const eq = document.getElementById('eq');
    const vsl = 4012.20, entry = 4022.90, tp = 4054.80, lotValue = 474;
    function render(idx){
      activeCols = Math.max(0, Math.min(colors.length - 1, idx));
      const pct = activeCols / (colors.length - 1);
      const price = vsl + (tp - vsl) * pct;
      const pnl = (price - entry) * lotValue;
      document.getElementById('cur_price').textContent = price.toFixed(2);
      document.getElementById('vsl_dist').textContent = '$' + Math.abs(price - vsl).toFixed(2);
      document.getElementById('tp_dist').textContent = '$' + Math.abs(tp - price).toFixed(2);
      const pnlEl = document.getElementById('float_pnl');
      pnlEl.textContent = (pnl >= 0 ? '+$' : '-$') + Math.abs(Math.round(pnl)).toLocaleString();
      pnlEl.style.color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
      eq.innerHTML = colors.map((c, idx)=>{
      const cls = (idx <= activeCols ? 'on ' : '') + (idx === activeCols ? 'current' : '');
      const priceAttr = idx === activeCols ? ` data-price="${price.toFixed(2)}"` : '';
      return `<span class="eq-col ${cls.trim()}"${priceAttr} style="--c:${c}"></span>`;
      }).join('');
    }
    render(activeCols);
    document.querySelector('.track').addEventListener('mousemove', e=>{
      const r = e.currentTarget.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      render(Math.round(pct * (colors.length - 1)));
    });
  </script>
</body>
</html>
